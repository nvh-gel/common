group 'com.eden'
version "${versions.common}"

repositories {
    mavenCentral()
}

file("versions.properties").withReader {
    Properties versions = new Properties()
    versions.load(it)
    project.ext.versions = versions
}

subprojects {
    apply plugin: "maven-publish"
    publishing {
        repositories {
            maven {
                name = "GitHubPackages"
                url = "https://maven.pkg.github.com/nvh-gel/registry"
                credentials {
                    username = project.findProperty("gpr.user") as String ?: System.getenv("USER")
                    password = project.findProperty("gpr.key") as String ?: System.getenv("TOKEN")
                }
            }
        }
        publications {
            gpr(MavenPublication) {}
        }
    }
}
